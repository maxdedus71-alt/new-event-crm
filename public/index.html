<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Система управления мероприятиями</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Система управления мероприятиями</h1>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="orders">Заказы</button>
      <button class="tab-btn" data-tab="contractors">Контрагенты</button>
      <button class="tab-btn" data-tab="clients">Клиенты</button>
      <button class="tab-btn" data-tab="archive">Архив</button>
    </nav>

    <section id="orders" class="tab-content active">
      <div class="toolbar">
        <button id="createOrderBtn">Создать новый заказ</button>
        <input type="text" id="orderSearch" placeholder="Поиск по заказам" />
        <select id="orderStatusFilter">
          <option value="">Все статусы</option>
          <option value="Отменен">Отменен</option>
          <option value="Выполнен">Выполнен</option>
          <option value="В работе">В работе</option>
          <option value="Жду подтверждения">Жду подтверждения</option>
          <option value="Заказ">Заказ</option>
        </select>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Номер</th>
              <th>Дата создания</th>
              <th>Менеджер</th>
              <th>Клиент</th>
              <th>Дата мероприятия</th>
              <th>Статус</th>
              <th>Оплата</th>
              <th>Итог клиенту</th>
              <th>Чистая прибыль</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="ordersTableBody"></tbody>
        </table>
      </div>
    </section>

    <section id="contractors" class="tab-content">
      <div class="toolbar">
        <button id="createContractorBtn">Добавить контрагента</button>
        <button id="exportContractorsExcel">Экспорт Excel</button>
        <button id="exportContractorsCsv">Экспорт CSV</button>
        <input type="text" id="contractorSearch" placeholder="Поиск контрагентов"
